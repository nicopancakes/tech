<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: white;
      border: 3px solid #333;
      min-height: 92vh;
    }

    header {
      padding: 20px 40px;
      border-bottom: 3px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img {
      height: 55px;
      vertical-align: middle;
    }

    nav a {
      margin-left: 30px;
      text-decoration: none;
      color: #000;
      font-size: 17px;
    }

    .hero {
      padding: 80px 40px 70px;
      text-align: center;
      border-bottom: 3px solid #333;
    }

    .hero h1 {
      font-size: 38px;
      margin-bottom: 25px;
      color: #000;
    }

    .hero p {
      font-size: 19px;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .projects {
      padding: 50px 40px;
    }

    .projects h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 28px;
    }

    .projects-container {
      display: flex;
      justify-content: center;
      gap: 60px;
      border-top: 3px solid #333;
      padding-top: 40px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-left: 3px solid #333;
      padding-left: 40px;
    }

    .column:first-child {
      border-left: none;
      padding-left: 0;
    }

    .project-link {
      font-size: 18px;
      color: #000;
      text-decoration: none;
    }

    .project-link:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 25px;
      background: #333;
      color: white;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="logo">
          <a href="/src/placeholder.png"><img src="/src/placeholder.png" alt="ReviewCalc Logo"></a>
      </div>
      <nav>
        <a href="/home/">Home</a>
      </nav>
    </header>
    <div class="hero">
      <h1>Tech</h1>
      <p>
Tools (probably) anyone wouldnt need
      </p>
    </div>
    <div class="projects">
      <h2>Our Projects</h2>
      <div class="projects-container">
        <div class="column">
          <a href="/cal/" class="project-link">Review Calculator</a>
        </div>
        <div class="column">
        </div>
        <div class="column">
        </div>
      </div>
    </div>
  </div>
</body>
</html>
