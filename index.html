<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFA Tech</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Verdana, Arial, Helvetica, sans-serif;
      background-color: #d6dde4;
      margin: 0;
      padding: 22px 12px;
      color: #1a1a1a;
    }

    a { color: #003399; }
    a:visited { color: #551A8B; }

    .container {
      max-width: 1040px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #7c8a9a;
      box-shadow: 2px 2px 6px rgba(0,0,0,0.25);
    }

    /* top corporate stripe, like an old nav bar */
    .topstripe {
      background: linear-gradient(180deg, #244a7a 0%, #16375e 100%);
      color: #cfe0f5;
      font-size: 11px;
      padding: 5px 24px;
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.3px;
      border-bottom: 1px solid #0d2036;
    }
    .topstripe a { color: #cfe0f5; text-decoration: none; margin-left: 18px; }
    .topstripe a:hover { text-decoration: underline; }

    header {
      padding: 20px 30px;
      border-bottom: 1px solid #b6c2cf;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafbfc;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo img {
      height: 100px;
      vertical-align: middle;
      display: block;
    }
    nav { 
      display: flex;
      gap: 2px;
    }
    nav a {
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
      color: #1a3a5c;
      padding: 8px 18px;
      background: linear-gradient(180deg, #f2f5f8 0%, #dbe3eb 100%);
      border: 1px solid #a9b8c6;
      border-bottom: 2px solid #7c8a9a;
    }
    nav a:hover {
      background: linear-gradient(180deg, #e8eef4 0%, #c8d4e0 100%);
      color: #003399;
    }

    .hero {
      padding: 46px 30px 40px;
      text-align: center;
      background: #ffffff;
      border-bottom: 1px solid #b6c2cf;
    }
    .hero .eyebrow {
      font-size: 11px;
      letter-spacing: 2px;
      color: #5c7a99;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .hero h1 {
      margin: 0 0 18px;
      font-family: "Times New Roman", Georgia, serif;
      font-size: 32px;
      color: #16375e;
      font-weight: bold;
    }
    .hero p {
      font-size: 15px;
      color: #3a3a3a;
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.7;
    }
    .hero-rule {
      width: 60px;
      border: none;
      border-top: 3px solid #16375e;
      margin: 20px auto 0;
    }

    .projects {
      padding: 38px 30px 44px;
      background: #f4f6f8;
    }
    .projects h2 {
      text-align: center;
      margin: 0 0 28px;
      font-family: "Times New Roman", Georgia, serif;
      font-size: 20px;
      color: #16375e;
      font-weight: bold;
      border-bottom: 1px solid #b6c2cf;
      padding-bottom: 10px;
    }

    .projects-container {
      display: flex;
      justify-content: center;
      gap: 22px;
      flex-wrap: wrap;
    }
    .column {
      background: #ffffff;
      border: 1px solid #b6c2cf;
      border-top: 3px solid #16375e;
      padding: 18px 22px;
      min-width: 210px;
      flex: 1;
      max-width: 280px;
      box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
    }
    .column:empty {
      border-top: 3px solid #c3ccd4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
    }
    .column:empty:after {
      content: "More tools coming soon";
      font-size: 12px;
      font-style: italic;
      color: #8a97a3;
    }
    .project-link {
      display: block;
      font-size: 14px;
      font-weight: bold;
      color: #003399;
      text-decoration: none;
      padding: 2px 0;
    }
    .project-link:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 16px;
      background: #16375e;
      color: #cfe0f5;
      font-size: 11px;
      border-top: 1px solid #0d2036;
    }
    footer .tag {
      margin-top: 4px;
      color: #8fa9c4;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="topstripe">
      <span>AFA Technical Homepage</span>
      <span><a href="/tech/home.html">Home</a></span>
    </div>

    <header>
      <div class="logo">
        <a href="https://github.com/nicopancakes/tech/blob/main/src/placeholder.png?raw=true">
          <img src="https://github.com/nicopancakes/tech/blob/main/src/placeholder.png?raw=true" alt="Logo">
        </a>
      </div>  
      <nav>
        <a href="/tech/home.html">Home</a>
      </nav>
    </header>

    <div class="hero">
      <div class="eyebrow">Established Online</div>
      <h1>AFA Tech Homepage</h1>
      <p>Tools (probably) anyone wouldn't need.</p>
      <hr class="hero-rule">
    </div>

    <div class="projects">
      <h2>Our Projects</h2>
      <div class="projects-container">
        <div class="column">
          <a href="/tech/cal.html" class="project-link">Review Calculator</a>
        </div>
        <div class="column"></div>
        <div class="column"></div>
      </div>
    </div>
  </div>
</body>
</html>
