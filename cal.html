<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Review Calculator</title>

<style>
body{
    font:14px Arial;
    background:#eee;
}

#box{
    width:420px;
    margin:40px auto;
    background:#fff;
    border:1px solid #888;
    padding:15px;
}
.header{
    height:50px;
    position:relative;
}

.logo{
    position:absolute;
    right:0;
    top:0;
    width:45px;
    height:45px;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

input,button{
    padding:6px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td,th{
    border:1px solid #bbb;
    padding:5px;
    text-align:center;
}

#out{
    margin-top:15px;
    border:1px solid #bbb;
    background:#f5f5f5;
    padding:10px;
}
</style>
</head>

<body>

<div id="box">

<div class="header">
    <div class="logo">
        <img src="https://github.com/nicopancakes/tech/blob/main/src/placeholder.png?raw=true" alt="">
    </div>
</div>

<h2>Review Calculator</h2>

<input id="rating" type="number" min="1" max="5" step="0.5" placeholder="Enter rating (1-5)">
<button onclick="add()">Add</button>

<table id="list">
<tr><th>Rating</th></tr>
</table>

<div id="out">
Reviews: 0<br>
Average: 0.00<br>
Professional Rating: 0.0/5 Stars
</div>

</div>

<script>
let reviews=[];

rating.onkeydown=e=>{
    if(e.key=="Enter") add();
};

function add(){
    let v=parseFloat(rating.value);

    if(isNaN(v)||v<1||v>5){
        alert("Enter a rating between 1 and 5");
        return;
    }

    reviews.push(v);
    rating.value="";

    list.innerHTML="<tr><th>Rating</th></tr>";

    let sum=0;

    reviews.forEach(r=>{
        sum+=r;
        list.innerHTML+=`<tr><td>${r}</td></tr>`;
    });

    let avg=sum/reviews.length;
    let prof=Math.round(avg*2)/2;

    out.innerHTML=
    `Reviews: ${reviews.length}<br>
    Average: ${avg.toFixed(2)}<br>
    Professional Rating: ${prof.toFixed(1)}/5 Stars`;

    rating.focus();
}
</script>

</body>
</html>
